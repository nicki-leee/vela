<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Vela · 你的训练教练</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vela">
<link rel="apple-touch-icon" href="../apple-touch-icon.png?v=3">
<link rel="icon" type="image/png" sizes="192x192" href="../icon-192.png">
<style>
  :root{
    --ink:#1D1D1F; --sub:#86868B; --line:#E8E8ED; --bg:#FBFBFD;
    --rose:#B04E77; --rose-deep:#8E3A5F; --rose-bg:#F9EDF3;
    --grad:linear-gradient(120deg,#C2426E,#7E2E5C);
    --green:#3E9B72; --green-bg:#E5F3EC;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  [hidden]{display:none !important}
  html{min-height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,'SF Pro Text','PingFang SC',system-ui,sans-serif;
    font-size:17px;line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
  .num{font-variant-numeric:tabular-nums}
  button{font:inherit;border:none;cursor:pointer;background:none}
  button:focus-visible{outline:3px solid var(--rose);outline-offset:2px}

  /* ---------- onboarding ---------- */
  #ob{position:fixed;inset:0;background:var(--bg);z-index:10;display:flex;flex-direction:column;overflow-y:auto}
  .ob-wrap{max-width:440px;width:100%;margin:0 auto;padding:calc(28px + env(safe-area-inset-top)) 26px 40px;
    display:flex;flex-direction:column;min-height:100%}
  .ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
  .ob-dots i{width:6px;height:6px;border-radius:99px;background:#DDD9DE;transition:all .3s}
  .ob-dots i.on{background:var(--rose);width:18px}
  .ob-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 0}
  .ob-step{animation:obin .35s ease}
  @keyframes obin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.ob-step{animation:none}}
  .ob-mark{width:54px;height:54px;border-radius:14px;margin-bottom:22px;
    background:var(--grad);position:relative;box-shadow:0 10px 26px rgba(154,58,100,.3)}
  .ob-mark::after{content:'V';position:absolute;inset:0;display:grid;place-items:center;
    color:#FFF6F9;font-family:ui-serif,'New York',Georgia,serif;font-style:italic;font-weight:700;font-size:30px}
  .ob-title{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.25;text-wrap:balance}
  .ob-sub{color:var(--sub);font-size:16px;margin-top:12px;line-height:1.65}
  .ob-opts{margin-top:34px;display:flex;flex-direction:column;gap:11px}
  .ob-opt{display:flex;align-items:center;gap:14px;text-align:left;background:#fff;border:1.5px solid var(--line);
    border-radius:16px;padding:16px 18px;font-size:17px;font-weight:600;color:var(--ink);transition:transform .1s}
  .ob-opt:active{transform:scale(.98)}
  .ob-opt .e{font-size:22px}
  .ob-opt small{display:block;font-weight:400;color:var(--sub);font-size:13.5px;margin-top:1px}
  .ob-date{margin-top:34px}
  .ob-date input{width:100%;font:inherit;font-size:18px;font-weight:600;padding:16px;border:1.5px solid var(--line);
    border-radius:16px;background:#fff;color:var(--ink);-webkit-appearance:none;appearance:none;text-align:left}
  .ob-date input::-webkit-date-and-time-value{text-align:left;margin:0}
  .ob-cta{margin-top:26px;width:100%;background:var(--grad);color:#fff;font-size:17px;font-weight:700;
    padding:17px;border-radius:99px;box-shadow:0 10px 26px rgba(154,58,100,.28)}
  .ob-cta[disabled]{opacity:.5}
  .ob-links{margin-top:22px;display:flex;flex-direction:column;gap:12px;align-items:center}
  .ob-link{color:var(--rose);font-size:14.5px;font-weight:600}
  .ob-ta{width:100%;margin-top:26px;font:inherit;font-size:16px;line-height:1.6;padding:16px;border:1.5px solid var(--line);
    border-radius:16px;background:#fff;color:var(--ink);resize:none;min-height:120px}
  .ob-coach{margin-top:26px;background:var(--rose-bg);border-radius:18px;padding:18px;font-size:16px;line-height:1.7;color:#6E3A52}
  .ob-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
  .ob-tags span{font-size:13px;font-weight:700;background:#fff;border:1.5px solid var(--line);border-radius:99px;padding:6px 13px}
  .ob-back{align-self:flex-start;color:var(--sub);font-size:15px;padding:8px 0;margin-bottom:4px}
  .ob-spin{margin:0 auto;width:46px;height:46px;border-radius:50%;border:3.5px solid #EFDDE7;border-top-color:var(--rose);
    animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .ob-gen{text-align:center}
  .ob-gen p{margin-top:22px;color:var(--sub)}

  /* ---------- app ---------- */
  #app{max-width:520px;margin:0 auto;padding:calc(16px + env(safe-area-inset-top)) 20px calc(96px + env(safe-area-inset-bottom))}
  .view{display:none}.view.on{display:block;animation:obin .25s ease}
  header.top{display:flex;justify-content:space-between;align-items:center;padding:4px 2px 18px}
  .wordmark{font-family:ui-serif,'New York',Georgia,serif;font-style:italic;font-weight:700;font-size:26px;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .h-chip{font-size:12.5px;font-weight:700;color:var(--sub);background:#fff;border:1px solid var(--line);
    border-radius:99px;padding:5px 13px}
  .h-chip b{color:var(--rose)}
  .card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:24px;margin-bottom:14px;
    box-shadow:0 6px 22px rgba(60,40,60,.05)}
  .t-date{font-size:13px;font-weight:600;color:var(--sub)}
  .t-phase{display:inline-block;margin-left:8px;font-size:11.5px;font-weight:700;color:var(--rose);
    background:var(--rose-bg);border-radius:99px;padding:2px 10px}
  .t-big{font-size:38px;font-weight:800;letter-spacing:-.02em;line-height:1.2;margin-top:14px;text-wrap:balance}
  .t-detail{color:var(--sub);font-size:15px;margin-top:10px;line-height:1.7}
  .t-note{margin-top:14px;background:var(--rose-bg);border-radius:14px;padding:12px 15px;font-size:13.5px;
    color:#7A4A60;line-height:1.65}
  .t-btns{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
  .b-main{flex:1;background:var(--grad);color:#fff;font-weight:700;font-size:16px;padding:15px;border-radius:99px;
    box-shadow:0 8px 22px rgba(154,58,100,.25)}
  .b-soft{background:var(--rose-bg);color:var(--rose-deep);font-weight:700;font-size:14px;padding:13px 20px;border-radius:99px}
  .done-line{display:flex;align-items:center;gap:10px;margin-top:18px;color:var(--green);font-weight:800;font-size:16px}
  .streak{color:#C58A2A;font-weight:800;font-size:13.5px;margin-top:10px}
  .feel{display:flex;gap:8px;margin-top:18px;align-items:center;flex-wrap:wrap}
  .feel span{font-size:12.5px;color:var(--sub);font-weight:600}
  .feel button{border:1.5px solid var(--line);background:#fff;border-radius:99px;padding:8px 15px;font-size:13.5px;font-weight:700;color:var(--ink)}
  .feel button.on{border-color:var(--rose);background:var(--rose-bg);color:var(--rose-deep)}
  h2.sec{font-size:12px;font-weight:800;letter-spacing:.18em;color:var(--sub);margin:2px 0 14px;text-transform:uppercase}
  .week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
  .ws{ text-align:center;background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:9px 2px;font-size:10.5px;color:var(--sub);font-weight:600}
  .ws .d{font-weight:700;font-size:11.5px;color:var(--ink)}
  .ws .k{font-weight:800;font-size:13px;color:var(--ink);margin-top:2px}
  .ws.today{border-color:var(--rose)}
  .ws.done{background:var(--rose);border-color:var(--rose);color:#F7DEE9}
  .ws.done .d,.ws.done .k{color:#fff}
  .day-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:1px solid var(--line);font-size:15px}
  .day-row:first-of-type{border-top:none}
  .day-row .dt{width:74px;color:var(--sub);flex-shrink:0;font-weight:600;font-size:13px}
  .day-row .nm{flex:1;font-weight:700}
  .day-row .nm small{display:block;font-weight:400;color:var(--sub);font-size:12.5px}
  .day-row.today-row{background:var(--rose-bg);margin:0 -10px;padding:12px 10px;border-radius:14px;border-top:none}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:6px}
  .cal .wdh{text-align:center;font-size:10.5px;font-weight:700;color:var(--sub);padding:4px 0}
  .cell{min-height:50px;border-radius:12px;padding:5px 2px;text-align:center;background:#fff;border:1.5px solid transparent;font-size:10px;color:var(--sub)}
  .cell .dn{font-size:11px;font-weight:700;color:var(--sub)}
  .cell .ind{font-weight:800;font-size:12px;color:var(--rose);margin-top:2px}
  .cell.today{border-color:var(--rose)}
  .cell.done{background:var(--grad);color:#F7DEE9;border-color:transparent}
  .cell.done .dn,.cell.done .ind{color:#fff}
  .cal-head{display:flex;justify-content:space-between;align-items:center;margin:4px 0 10px}
  .cal-title{font-size:18px;font-weight:700}
  .cal-nav button{background:#fff;border:1px solid var(--line);border-radius:99px;width:32px;height:32px;font-size:14px;color:var(--sub)}
  .hint{font-size:12.5px;color:var(--sub);margin-top:10px;line-height:1.7}
  .p-row{display:flex;justify-content:space-between;padding:13px 0;border-top:1px solid var(--line);font-size:15px}
  .p-row:first-of-type{border-top:none}
  .p-row b{font-weight:700}
  .p-row span{color:var(--sub)}
  nav.tabs{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(12px + env(safe-area-inset-bottom));z-index:5;
    width:min(420px,calc(100% - 32px));background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--line);border-radius:99px;display:flex;gap:2px;padding:6px;box-shadow:0 12px 32px rgba(60,40,60,.14)}
  nav.tabs button{flex:1;color:var(--sub);font-size:14px;font-weight:700;padding:12px 0;border-radius:99px}
  nav.tabs button.on{color:#fff;background:var(--grad)}
</style>
</head>
<body>
<div id="boot-msg" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#86868B;font-size:15px;background:#FBFBFD">
  <div style="font-family:Georgia,serif;font-style:italic;font-weight:700;font-size:34px;background:linear-gradient(120deg,#C2426E,#7E2E5C);-webkit-background-clip:text;background-clip:text;color:transparent">Vela</div>
  <div>正在准备…</div>
  <noscript>需要开启 JavaScript 才能使用 Vela</noscript>
</div>
<div id="ob" hidden></div>
<div id="app" hidden>
  <header class="top">
    <span class="wordmark">Vela</span>
    <span class="h-chip" id="h-goal"></span>
  </header>
  <section class="view" id="view-today"></section>
  <section class="view" id="view-plan"></section>
  <section class="view" id="view-me"></section>
</div>
<nav class="tabs" hidden aria-label="主导航">
  <button data-v="today">今天</button>
  <button data-v="plan">课表</button>
  <button data-v="me">我的</button>
</nav>

<script>
'use strict';
window.onerror=function(msg,src,line){
  var el=document.getElementById('boot-msg');
  if(el){el.innerHTML='<div style="max-width:320px;text-align:center;padding:20px"><b style="color:#B04E77">页面出了点问题</b><br><br><code style="font-size:12px;word-break:break-all">'+msg+' @'+line+'</code><br><br>请截图发给 Vela，然后点 <a href="javascript:location.reload()" style="color:#B04E77;font-weight:700">重试</a></div>';el.style.display='flex';}
};
const KEY='vela.go.v1';
let state=load();
function load(){
  try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.v===1)return s;}catch(e){}
  return {v:1,profile:null,checkins:{},planStart:null};
}
function save(){
  state.updatedAt=Date.now();
  try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){/* 私密模式：内存态继续可用 */}
  if(typeof cloudPush==='function')cloudPush();
}

/* ---------- dates ---------- */
function p(s){const[a,b,c]=s.split('-').map(Number);return new Date(a,b-1,c);}
function f(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addD(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function addM(d,n){return new Date(d.getFullYear(),d.getMonth()+n,1);}
function monday(d){const x=new Date(d);x.setDate(x.getDate()-((x.getDay()+6)%7));return x;}
function dayDiff(a,b){return Math.round((p(f(a))-p(f(b)))/864e5);}
function todayStr(){return f(new Date());}
const WD=['日','一','二','三','四','五','六'];
const $=s=>document.querySelector(s);
function esc(x){return String(x).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- cycle ---------- */
function phaseDay(ds){
  const c=state.profile&&state.profile.cycle;
  if(!c||!c.on||!c.last)return null;
  const diff=dayDiff(p(ds),p(c.last));
  if(diff<0)return null;
  return (diff%(c.len||28))+1;
}
function phaseInfo(ds){
  const d=phaseDay(ds);
  if(d==null)return null;
  if(d<=2)return{d,key:'mens1',name:'经期第'+d+'天',emoji:'🩸'};
  if(d<=5)return{d,key:'mens2',name:'经期第'+d+'天',emoji:'🩸'};
  if(d<=13)return{d,key:'foll',name:'卵泡期',emoji:'🌱'};
  if(d<=16)return{d,key:'ovul',name:'排卵期',emoji:'🌕'};
  if(d>=(state.profile.cycle.len||28)-3)return{d,key:'lute2',name:'黄体期后段',emoji:'🌘'};
  return{d,key:'lute',name:'黄体期',emoji:'🌙'};
}

/* ---------- plan engines ---------- */
const DIST_PEAK={'5k':8,'10k':12,'half':18,'full':30,'trail':20};
const DIST_NAME={'5k':'5K','10k':'10K','half':'半程马拉松','full':'全程马拉松','trail':'越野跑'};
const LEVEL_START={'3':3,'5':5,'10':8,'15':12};
function runDays(n){return n==='2-3'?[2,4,0]:n==='4-5'?[2,4,6,0]:[2,3,4,6,0];}
function weekIdx(ds){return Math.floor(dayDiff(p(ds),p(state.planStart))/7);}

function slotFor(ds){
  const pr=state.profile;
  if(!pr)return null;
  const wd=p(ds).getDay();
  const wi=weekIdx(ds);
  const days=runDays(pr.days);
  const g=pr.goal;
  let w=null;
  if(g==='race'){
    const races=racesOf(pr);
    if(!races.length)return null;
    const A=aRace(races);
    /* 比赛日本尊 */
    const tr=races.find(r=>r.date===ds);
    if(tr)return{t:'race',label:(tr.name||DIST_NAME[tr.dist])+' 比赛日 🏁',detail:'享受它，你准备好了',km:0};
    if(ds>races[races.length-1].date)return null;
    /* 每场比赛的前后保护：赛前2天短热身、赛前1天休、赛后2天恢复 */
    for(const r of races){
      const before=dayDiff(p(r.date),p(ds));
      if(before===1)return{t:'rest',label:'赛前休息',detail:'明天是 '+(r.name||DIST_NAME[r.dist])+'，养精蓄锐',km:0};
      if(before===2)return{t:'easy',label:'赛前激活 3 km',detail:'很轻松地抖开身体，别练累',km:3};
      const after=dayDiff(p(ds),p(r.date));
      if(after===1||after===2)return{t:'rest',label:'赛后恢复',detail:'比赛后 48 小时，走路和拉伸最好',km:0};
    }
    /* 长距离渐进以最重头的比赛(A赛)倒推 */
    const total=Math.max(4,Math.ceil(dayDiff(p(A.date),p(state.planStart))/7));
    const taper=A.dist==='full'||A.dist==='half'?2:1;
    const L0=LEVEL_START[pr.level]||5, peak=DIST_PEAK[A.dist];
    const build=Math.max(1,total-taper-1);
    let long=Math.min(peak,L0+(peak-L0)*Math.min(1,wi/Math.max(1,build-1)));
    if(wi%4===3&&wi<build-1)long*=0.75;
    if(wi>=build)long=peak*0.6*Math.max(0.3,(1-(wi-build)*0.25));
    long=Math.max(3,Math.round(long));
    const easy=Math.max(3,Math.round(long*0.45));
    if(wd===0)w={t:'long',label:'长距离 '+long+' km',detail:'轻松聊天配速，慢就是对',km:long};
    else if(wd===2)w={t:'easy',label:'轻松跑 '+easy+' km',detail:'能聊天的配速，心率放低',km:easy};
    else if(wd===4&&wi>=2){
      if(A.dist==='trail'||races.some(r=>r.dist==='trail'))w={t:'hill',label:'坡度跑 '+easy+' km',detail:'6 组上坡 90 秒，下坡走回（护膝）',km:easy};
      else if(A.dist==='5k'||A.dist==='10k')w={t:'int',label:'间歇跑 '+easy+' km',detail:'6×400m 快 + 慢跑恢复，提最大摄氧量',km:easy};
      else w={t:'tempo',label:'节奏跑 '+easy+' km',detail:'中间 '+Math.max(2,Math.round(easy*0.4))+' km 稍快于目标配速',km:easy};
    }
    else if(wd===4)w={t:'easy',label:'轻松跑 '+easy+' km',detail:'打底阶段，全部轻松',km:easy};
    else if(days.includes(wd)&&wd===6)w={t:'easy',label:'轻松跑 '+Math.max(3,Math.round(long*0.35))+' km',detail:'长距离前一天，短而轻',km:Math.max(3,Math.round(long*0.35))};
    else if(days.includes(wd))w={t:'strength',label:'力量 30 分钟',detail:'深蹲 · 臀桥 · 平板支撑 · 提踵，各 3 组',min:30};
  }else if(g==='fatloss'){
    const base=Math.min(55,30+wi*2);
    const menu=pr.style==='walkrun'
      ?[{t:'wr',label:'走跑结合 '+base+' 分钟',detail:'快走 3 分钟 + 慢跑 2 分钟，循环',min:base},
        {t:'strength',label:'力量循环 30 分钟',detail:'深蹲 · 弓步 · 俯卧撑（跪姿可）· 平板，各 3 组',min:30},
        {t:'walk',label:'快走 45 分钟',detail:'微喘但能说话的强度',min:45}]
      :pr.style==='run'
      ?[{t:'easy',label:'轻松跑 '+Math.round(base/8)+' km',detail:'能聊天的配速',km:Math.round(base/8)},
        {t:'strength',label:'力量循环 30 分钟',detail:'下肢 + 核心，各 3 组',min:30},
        {t:'wr',label:'变速走跑 '+base+' 分钟',detail:'1 分钟快 + 2 分钟慢，循环',min:base}]
      :[{t:'strength',label:'力量循环 35 分钟',detail:'全身大肌群，重量以 12 次力竭为准',min:35},
        {t:'cardio',label:'有氧 '+base+' 分钟',detail:'跑步机 / 单车 / 椭圆机任选，中低强度',min:base},
        {t:'core',label:'核心 + 快走 40 分钟',detail:'核心 15 分钟 + 快走 25 分钟',min:40}];
    const idx=days.indexOf(wd);
    if(idx>=0)w=menu[idx%menu.length];
  }else if(g==='flex'){
    const mins=pr.style==='45'?45:pr.style==='15'?15:30;
    const menu=[
      {t:'flow',label:'流动瑜伽 '+mins+' 分钟',detail:'呼吸带动身体，慢下来',min:mins},
      {t:'pilates',label:'核心普拉提 '+mins+' 分钟',detail:'骨盆稳定 + 深层核心',min:mins},
      {t:'hip',label:'髋与下背释放 '+mins+' 分钟',detail:'久坐者的解药',min:mins},
      {t:'stretch',label:'全身拉伸 '+Math.min(mins,30)+' 分钟',detail:'每个动作停留 45 秒',min:Math.min(mins,30)}];
    const idx=days.indexOf(wd);
    if(idx>=0)w=menu[(idx+wi)%menu.length];
  }else{
    const menu=[
      {t:'strength',label:'全身力量 35 分钟',detail:'深蹲 · 硬拉 · 推 · 拉，各 3-4 组',min:35},
      {t:'cardio',label:'轻松有氧 30 分钟',detail:'跑 / 骑 / 划船任选',min:30},
      {t:'core',label:'核心 + 臀腿 30 分钟',detail:'平板家族 + 臀桥 + 箭步蹲',min:30},
      {t:'outdoor',label:'户外快走或慢跑 40 分钟',detail:'晒晒太阳，动起来就赢',min:40}];
    const idx=days.indexOf(wd);
    if(idx>=0)w=menu[(idx+wi)%menu.length];
  }
  /* cycle overlay: day 1-2 rest, key session shifts a day earlier if possible */
  const ph=phaseInfo(ds);

}
function planFor(ds){

    return{t:'rest',label:'休息日 🌙',detail:'经期第 '+ph.d+' 天，休息写在课表里，不算偷懒',km:0};
  return{t:'rest',label:'休息日',detail:'恢复也是训练的一部分，可以散步或拉伸',km:0};

/* 国内直连优先：浏览器直接调 DeepSeek（预充值余额封顶，风险有界）；失败再走海外中转 */
const DSKB='NTEyOTJhNzBhZjhjZjE2YmU1NDRkMmU2YmVlYjM1ZDcta3M=';
function dsk(){return atob(DSKB).split('').reverse().join('');}
function aiSys(){
  const today=f(new Date());
  return '你是女性训练 App「Vela」的教练解析器。用户是备赛跑者，未来半年可能有多场比赛。把她的描述按固定五个维度完整解析为严格 JSON（不要输出任何其他内容）：\n{\n "recent": "…",   // 维度①当前水平：把最近跑步表现原样完整提取并算出配速，如"8km 56分(7:00/km)"；没提就空串\n "races": [{"name":"深圳半马","dist":"5k|10k|half|full|trail","date":"YYYY-MM-DD"}],\n                   // 维度②赛程表：提到的所有比赛一场不漏全部列出，按时间排序。日期模糊(如11月底)就取该月最后一个周日；只说"半马/全马/越野"没说名字则 name 留空。今天是 '+today+'\n "days": "2-3|4-5|6+",   // 维度③训练频率，未知给"2-3"\n "target": "…",   // 维度④目标：成绩/完赛目标一句话，如"半马安全完赛"或"全马破5"\n "notes": "…",    // 维度⑤约束：伤病、时间限制等一句话，无则空串\n "level": "3|5|10|15",   // 依据 recent 推档：配速>7:30或只能跑3km给"3"；能跑5km给"5"；能跑10km或5km配速<6:00给"10"；能跑15km+给"15"，未知给"5"\n "coach": "…"     // 温暖专业的教练回应(45字内)：必须引用她的具体数据，且如果有多场比赛要点出"共N场"的备赛节奏\n}';
}
const RANK={'5k':5,'10k':10,'trail':20,'half':21,'full':42};
function racesOf(pr){
  let rs=(pr.races&&pr.races.length)?pr.races:(pr.race&&pr.race.date?[{name:'',dist:pr.race.dist,date:pr.race.date}]:[]);
  return rs.filter(r=>r&&DIST_PEAK[r.dist]&&/^\d{4}-\d{2}-\d{2}$/.test(r.date||'')).slice().sort((x,y)=>x.date<y.date?-1:1);
}
function aRace(rs){return rs.reduce((m,r)=>RANK[r.dist]>=RANK[m.dist]?r:m,rs[0]);}
/* 绝对超时：不依赖浏览器的 abort 支持，race 到点必拒绝 */
function withTimeout(p,ms,tag){
  return Promise.race([p,new Promise(function(_,rej){setTimeout(function(){rej(new Error(tag+'超时'));},ms);})]);
}
async function aiParse(text){
  /* 1st: direct DeepSeek (domestic, fast) */
  try{
    const r=await withTimeout(fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:'Bearer '+dsk()},
      body:JSON.stringify({model:'deepseek-chat',temperature:0.2,max_tokens:400,
        response_format:{type:'json_object'},
        messages:[{role:'system',content:aiSys()},{role:'user',content:text}]})}),15000,'直连');
    if(!r.ok)throw new Error('ds '+r.status);
    const d=await withTimeout(r.json(),8000,'读取');
    return JSON.parse(d.choices[0].message.content);
  }catch(e){
    /* 2nd: overseas relay fallback */
    const r=await withTimeout(fetch(API+'/api/ai',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({text})}),10000,'中转');
    if(!r.ok)throw new Error('网络不给力');
    return withTimeout(r.json(),8000,'读取');
  }
}

function genCode(){
  const CS='ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  const four=()=>Array.from({length:4},()=>CS[Math.floor(Math.random()*CS.length)]).join('');
  return 'VELA-'+four()+'-'+four();
}

      .then(()=>{state.syncedAt=Date.now();try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}})

async function cloudPull(){
  if(!state.code)return;

}
function streak(){
  let n=0,d=p(todayStr());
  if(!(state.checkins[todayStr()]&&state.checkins[todayStr()].done))d=addD(d,-1);
  while(true){const c=state.checkins[f(d)];if(c&&c.done){n++;d=addD(d,-1);}else break;}
  return n;
}
function celebrate(){
  try{if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;}catch(e){}
  let cv=document.getElementById('cf');
  if(!cv){cv=document.createElement('canvas');cv.id='cf';cv.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:99';document.body.appendChild(cv);}
  cv.width=innerWidth;cv.height=innerHeight;
  const ctx=cv.getContext('2d');
  const cols=['#C2426E','#F2C9DA','#7E2E5C','#FFF6F9','#E8A3B8'];
  const ps=Array.from({length:90},()=>({x:cv.width/2,y:cv.height*0.4,vx:(Math.random()-0.5)*11,vy:-(Math.random()*9+4),r:Math.random()*5+3,c:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*6}));
  let t0=null;
  (function step(ts){
    if(!t0)t0=ts;const el=ts-t0;
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.globalAlpha=Math.max(0,1-el/1400);
    ps.forEach(q=>{q.x+=q.vx;q.y+=q.vy;q.vy+=0.26;q.rot+=0.1;
      ctx.save();ctx.translate(q.x,q.y);ctx.rotate(q.rot);ctx.fillStyle=q.c;ctx.fillRect(-q.r,-q.r/2,q.r*2,q.r);ctx.restore();});
    ctx.globalAlpha=1;
    if(el<1500)requestAnimationFrame(step);else ctx.clearRect(0,0,cv.width,cv.height);
  })(performance.now());
}

function renderToday(){
  const ds=todayStr();
  const d=p(ds);
  const ci=state.checkins[ds];
  let w=planFor(ds);
  const ph=phaseInfo(ds);
  let note='';
  if(feelToday==='bad'&&w.t!=='rest'){
    note='今天状态不行就直接休息，或者只做原计划的一半。可持续 > 完美。';
  }else if(ph&&ph.key==='foll'&&(w.t==='long'||w.t==='int'||w.t==='tempo'||w.t==='hill')){
    note='卵泡期是身体状态的黄金窗口，今天的课值得认真完成。';
  }else if(ph&&ph.key==='lute2'){
    note='黄体期后段，体感偏沉是正常的，允许自己慢一点。';
  }
  let h='<div class="card">';
  h+='<span class="t-date">'+(d.getMonth()+1)+'月'+d.getDate()+'日 · 周'+WD[d.getDay()]+'</span>';
  if(ph)h+='<span class="t-phase">'+ph.emoji+' '+esc(ph.name)+'</span>';
  h+='<div class="t-big">'+esc(w.label)+'</div>';
  h+='<div class="t-detail">'+esc(w.detail)+'</div>';
  if(note)h+='<div class="t-note">'+esc(note)+'</div>';
  if(ci&&ci.done){
    h+='<div class="done-line">✓ 今天完成了，漂亮</div>';
    if(streak()>1)h+='<div class="streak">🔥 连续 '+streak()+' 天</div>';
  }else{
    h+='<div class="t-btns"><button class="b-main" onclick="markDone()">'+(w.t==='rest'?'✓ 今天好好休息':'✓ 完成今日')+'</button></div>';
    h+='<div class="feel"><span>今天感觉：</span>'+
      [['good','很好'],['ok','一般'],['bad','不太行']].map(x=>
      '<button class="'+(feelToday===x[0]?'on':'')+'" onclick="setFeel(\''+x[0]+'\')">'+x[1]+'</button>').join('')+'</div>';
  }
  if(ph&&state.profile.cycle.on){
    h+='<div class="t-btns" style="margin-top:16px"><button class="b-soft" onclick="periodToday()">🩸 今天月经来了（第 1 天）</button></div>';
  }
  h+='</div>';
  /* week strip */
  h+='<div class="card"><h2 class="sec">本周</h2><div class="week-strip">';
  const mon=monday(d);
  for(let i=0;i<7;i++){
    const k=f(addD(mon,i)),dd=addD(mon,i);
    const ww=planFor(k);
    const done=state.checkins[k]&&state.checkins[k].done;
    h+='<div class="ws'+(k===ds?' today':'')+(done?' done':'')+'">';
    h+='<div class="d">'+WD[dd.getDay()]+'</div>';
    h+='<div class="k num">'+(done?'✓':ww.km?ww.km:'')+(!done&&!ww.km&&ww.min?ww.min+"'":'')+(!done&&ww.t==='rest'?'休':'')+'</div>';
    h+='</div>';
  }
  h+='</div></div>';
  $('#view-today').innerHTML=h;
  $('#h-goal').innerHTML='目标 <b>'+esc(goalLabel())+'</b>';
}
window.setFeel=function(v){feelToday=(feelToday===v?null:v);renderToday();};
window.markDone=function(){
  const ds=todayStr();
  const w=planFor(ds);
  state.checkins[ds]={done:true,label:w.label,km:w.km||0};
  save();celebrate();renderToday();renderPlan();
};
window.periodToday=function(){
  state.profile.cycle.last=todayStr();
  save();renderToday();renderPlan();
};

function renderPlan(){
  const ds=todayStr();
  if(!calCur)calCur=new Date(p(ds).getFullYear(),p(ds).getMonth(),1);
  let h='<div class="card"><h2 class="sec">本周安排</h2>';
  const mon=monday(p(ds));
  for(let i=0;i<7;i++){
    const k=f(addD(mon,i)),dd=addD(mon,i);
    const w=planFor(k);
    const done=state.checkins[k]&&state.checkins[k].done;
    h+='<div class="day-row'+(k===ds?' today-row':'')+'">';
    h+='<span class="dt">'+k.slice(5).replace('-','/')+' 周'+WD[dd.getDay()]+'</span>';
    h+='<span class="nm">'+(done?'✓ ':'')+esc(w.label)+'<small>'+esc(w.detail)+'</small></span></div>';
  }
  h+='</div>';
  /* month */
  const y=calCur.getFullYear(),m=calCur.getMonth();
  h+='<div class="card"><div class="cal-head"><span class="cal-title">'+y+' 年 '+(m+1)+' 月</span>';
  h+='<span class="cal-nav"><button onclick="calNav(-1)">‹</button> <button onclick="calNav(1)">›</button></span></div>';
  h+='<div class="cal">';
  ['一','二','三','四','五','六','日'].forEach(x=>h+='<div class="wdh">'+x+'</div>');
  const first=new Date(y,m,1),startIdx=(first.getDay()+6)%7,daysIn=new Date(y,m+1,0).getDate();
  for(let i=0;i<startIdx;i++)h+='<div></div>';
  for(let dd=1;dd<=daysIn;dd++){
    const k=f(new Date(y,m,dd));
    const w=planFor(k);
    const done=state.checkins[k]&&state.checkins[k].done;
    const race=w.t==='race';
    h+='<div class="cell'+(k===ds?' today':'')+(done?' done':'')+'">';
    h+='<div class="dn num">'+dd+'</div>';
    h+='<div class="ind">'+(done?'✓':race?'🏁':w.km?w.km:w.min?w.min+"'":'·')+'</div>';
    h+='</div>';
  }
  h+='</div><p class="hint">数字 = 公里数或分钟数 · 玫瑰色 = 已完成 · 🏁 = 比赛日'+(state.profile.cycle.on?' · 经期前两天自动排休':'')+'</p></div>';
  $('#view-plan').innerHTML=h;
}
window.calNav=function(n){calCur=addM(calCur,n);renderPlan();};

function renderMe(){
  const pr=state.profile;
  let h='<div class="card"><h2 class="sec">我的计划</h2>';
  h+='<div class="p-row"><span>目标</span><b>'+esc(goalLabel())+'</b></div>';
  if(pr.goal==='race')racesOf(pr).forEach(r=>{
    h+='<div class="p-row"><span>🏁 '+esc(r.name||DIST_NAME[r.dist])+'</span><b class="num">'+esc(r.date)+'</b></div>';
  });
  h+='<div class="p-row"><span>每周训练</span><b>'+esc(pr.days)+' 天</b></div>';
  h+='<div class="p-row"><span>周期排课</span><b>'+(pr.cycle.on?'开启 🌙':'未开启')+'</b></div>';
  if(pr.notes)h+='<div class="p-row"><span>教练备注</span><b>'+esc(pr.notes)+'</b></div>';
  h+='<div class="t-btns" style="margin-top:18px"><button class="b-main" onclick="restartOB()">重新设定目标</button></div>';
  h+='<p class="hint">重新设定会生成新计划，已完成的打卡记录会保留。</p></div>';
  if(state.code){
    h+='<div class="card"><h2 class="sec">恢复码</h2>';
    h+='<div style="font-size:24px;font-weight:800;letter-spacing:.08em;font-family:ui-monospace,monospace">'+esc(state.code)+'</div>';
    h+='<p class="hint">你的数据（目标、经期日期、打卡）会自动同步到云端。换手机或清了缓存后，在欢迎页点「找回我的数据」输入这串码即可全部找回。请抄下来，别公开发出去。'+(state.syncedAt?'<br>上次同步：'+new Date(state.syncedAt).toLocaleString():'')+'</p></div>';
  }
  h+='<div class="card"><h2 class="sec">关于 Vela</h2><p class="hint" style="margin-top:0">Vela 相信：训练计划应该围着你的生活转，而不是反过来。每天完成后点一下 ✓，课表会自动跟着你的节奏走。<br><br>由 Vela 引擎驱动 · 月夜跑者 🌙</p></div>';
  $('#view-me').innerHTML=h;
}
window.restartOB=function(){
  state.profile=null;save();
  OB.i=0;OB.a={};
  boot();
};

function boot(){
  const bm=document.getElementById('boot-msg');
  if(bm)bm.style.display='none';
  if(!state.profile){
    $('#app').hidden=true;document.querySelector('nav.tabs').hidden=true;
    $('#ob').hidden=false;renderOB();
  }else{
    $('#ob').hidden=true;$('#app').hidden=false;document.querySelector('nav.tabs').hidden=false;
    renderToday();renderPlan();renderMe();switchView('today');
    cloudPull();
  }
}
try{boot();}
catch(e){
  var bm=document.getElementById('boot-msg');
  if(bm){bm.style.display='flex';
    bm.innerHTML='<div style="max-width:320px;text-align:center;padding:20px"><b style="color:#B04E77">本地数据和新版本不兼容</b><br><br><code style="font-size:12px;word-break:break-all">'+String(e.message||e)+'</code><br><br><button onclick="localStorage.removeItem(\'vela.go.v1\');location.reload()" style="font:inherit;background:#B04E77;color:#fff;border:none;border-radius:99px;padding:12px 24px;font-weight:700">清除本地数据，重新开始</button></div>';
  }
}
</script>
</body>
</html>
