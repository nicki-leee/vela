<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2">
<link rel="apple-touch-icon-precomposed" href="apple-touch-icon.png?v=2">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Vela 轻盈向前</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Vela">
<style>
  :root{
    --navy:#2E4256; --navy-deep:#22344A;
    --plum:#8E5274; --plum-bg:#F3E3EC;
    --pink:#F0DCE7; --pink-soft:#F9F1F6;
    --blue:#C7E2F2; --blue-deep:#5E82A6; --blue-bg:#EAF3FA;
    --ink:#2E4256; --mut:#93A0AF; --soft:#5C6B7E;
    --line:#EAE6EC;
    --green:#4A9B7D; --green-bg:#E4F2EC;
    --amber:#C08A45; --amber-bg:#F8EEDF;
    --red:#C96A5E;   --red-bg:#F9E7E3;
    --rose:#C95C7E;  --rose-bg:#FAE9EF;
    --serif:ui-serif,'New York','Songti SC',Georgia,serif;
    --script:'Snell Roundhand','Apple Chancery','Kaiti SC',cursive;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{min-height:100%}
  body{
    background:#FBFAFC;
    font-family:-apple-system,'SF Pro Text','PingFang SC',system-ui,sans-serif;
    color:var(--ink); font-size:16px; line-height:1.55;
    -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent;
  }
  .num{font-variant-numeric:tabular-nums}

  /* ---- home scene (Aman dawn) ---- */
  .scene{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .5s;overflow:hidden;
    background:
      radial-gradient(130% 90% at 85% 6%, #CFE6F4 0%, rgba(207,230,244,0) 62%),
      radial-gradient(120% 90% at 8% 14%, #F2DCE9 0%, rgba(242,220,233,0) 58%),
      linear-gradient(168deg,#F7EFF5 0%,#EDF3F8 100%)}
  body.on-home .scene{opacity:1}
  .scene .hill{position:absolute;border-radius:50%;filter:blur(46px)}
  .scene .h1{width:80vw;height:42vw;max-width:560px;background:#B98CA6;opacity:.20;bottom:-8vw;left:-14vw}
  .scene .h2{width:76vw;height:40vw;max-width:520px;background:#2E4256;opacity:.10;bottom:-14vw;right:-16vw}
  .scene .h3{width:50vw;height:26vw;max-width:360px;background:#9FBFD8;opacity:.22;bottom:2vw;right:6vw}
  .scene .arc{position:absolute;width:140vmax;height:140vmax;border-radius:50%;left:50%;top:18%;
    border:1.5px solid rgba(255,255,255,.65);border-color:rgba(255,255,255,.65) transparent transparent transparent;
    transform:translateX(-50%) rotate(-8deg)}
  .scene .arc.a2{top:23%;border-width:1px;opacity:.5;transform:translateX(-52%) rotate(-11deg)}
  @media (prefers-reduced-motion:no-preference){
    .scene .arc{animation:drift 26s ease-in-out infinite alternate}
    .scene .arc.a2{animation:drift 34s ease-in-out infinite alternate-reverse}
    @keyframes drift{from{transform:translateX(-50%) rotate(-8deg)}to{transform:translateX(-48%) rotate(-4deg)}}
  }

  #app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:14px 18px calc(96px + env(safe-area-inset-bottom))}
  .view{display:none}.view.on{display:block}
  @media (prefers-reduced-motion:no-preference){ .view.on{animation:in .2s ease} @keyframes in{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:none}} }

  /* ---- gear ---- */
  .gear{position:fixed;top:calc(12px + env(safe-area-inset-top));right:14px;z-index:5;
    width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.8);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.95);box-shadow:0 6px 16px rgba(46,66,86,.12);
    font-size:16px;display:grid;place-items:center;padding:0}

  /* ---- home ---- */
  .home{min-height:calc(100vh - 170px);display:flex;flex-direction:column;justify-content:center}
  .home-top{display:flex;justify-content:space-between;align-items:center;padding:6px 2px 22px}
  .wordmark b{display:block;font-family:var(--serif);font-weight:700;font-style:italic;font-size:34px;line-height:1;letter-spacing:.01em;
    background:linear-gradient(105deg,#2E4256 30%,#8E5274 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .wordmark i{display:block;font-style:normal;font-size:8.5px;font-weight:800;letter-spacing:.42em;color:var(--mut);margin-top:3px;padding-left:2px}
  .h-count{font-size:12px;font-weight:700;color:var(--soft);background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.9);border-radius:99px;padding:4px 13px}
  .h-count b{color:var(--plum)}
  .flip-wrap{perspective:1400px}
  .flip{position:relative;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.35,.1,.2,1)}
  .flip.flipped{transform:rotateY(180deg)}
  @media (prefers-reduced-motion:reduce){.flip{transition:none}}
  .face{backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:rgba(255,255,255,.68);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,.95);border-radius:30px;padding:34px 26px 26px;
    box-shadow:0 20px 50px rgba(84,74,110,.16);text-align:center;min-height:440px;
    display:flex;flex-direction:column;justify-content:center}
  .face.back{position:absolute;inset:0;transform:rotateY(180deg);justify-content:flex-start;text-align:left;overflow-y:auto;padding-top:28px}
  .h-date{font-size:12.5px;font-weight:600;color:var(--soft);letter-spacing:.04em}
  .h-phase{display:inline-block;margin:10px auto 0;font-size:11.5px;font-weight:700;color:var(--plum);background:var(--plum-bg);border-radius:99px;padding:4px 13px}
  .h-phase.warn{color:var(--amber);background:var(--amber-bg)}
  .h-kicker{margin-top:22px;font-size:11px;font-weight:700;letter-spacing:.3em;color:var(--blue-deep)}
  .h-goal{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-top:6px}
  .h-km{font-family:var(--serif);font-weight:600;font-size:98px;line-height:1.05;letter-spacing:-.02em}
  .h-km.small{font-size:46px;line-height:1.3}
  .h-unit{font-family:var(--serif);font-size:26px;color:var(--mut)}
  .h-type{font-family:var(--serif);font-size:19px;margin-top:4px;color:var(--soft)}
  .h-note{font-size:12.5px;color:var(--mut);margin-top:8px}
  .h-slogan{font-family:var(--script);font-size:27px;color:var(--plum);margin-top:22px;line-height:1.4}
  .h-btns{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
  button{font:inherit;cursor:pointer;border:none;font-weight:700}
  button:focus-visible{outline:3px solid var(--blue-deep);outline-offset:2px}
  .b-navy{background:var(--navy);color:#fff;border-radius:99px;padding:14px 30px;font-size:15px;box-shadow:0 10px 24px rgba(46,66,86,.28)}
  .b-out{background:rgba(255,255,255,.65);color:var(--navy);border:1.5px solid var(--pink);border-radius:99px;padding:13px 24px;font-size:14px}
  .b-plum{background:var(--plum-bg);color:var(--plum);border-radius:99px;padding:13px 24px;font-size:14px}
  .h-why{background:none;color:var(--mut);font-size:12.5px;margin-top:18px;padding:6px;font-weight:600}
  .done-badge{display:inline-flex;align-items:center;gap:7px;margin:20px auto 0;font-size:14px;font-weight:800;color:var(--green);background:var(--green-bg);border-radius:99px;padding:8px 18px}
  .done-big{font-family:var(--serif);font-size:38px;font-weight:600;margin-top:14px;line-height:1.25}
  .done-big .num{font-size:44px}
  .streak{font-size:14px;font-weight:800;color:var(--amber);margin-top:12px}
  .ex-done{display:inline-block;background:var(--green-bg);color:var(--green);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;margin:2px}
  .extra-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;align-items:center;margin-top:16px;font-size:12px;color:var(--mut);font-weight:600}
  .chip-btn{background:var(--pink-soft);border:1px solid var(--pink);color:var(--plum);border-radius:99px;padding:7px 13px;font-size:12.5px;font-weight:700}
  .cell.fill{border-color:transparent}
  .cell.fill .dn{color:rgba(255,255,255,.8)}
  .cell.fill .ind{color:#fff !important;font-size:14px}
  .cell.fill .plus{font-size:9px;color:rgba(255,255,255,.85);font-weight:800}
  /* back face */
  .why-kicker{font-size:11px;font-weight:700;letter-spacing:.3em;color:var(--blue-deep);text-align:center;margin-bottom:14px}
  .score-line{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .score-line .sc{font-family:var(--serif);font-size:38px;font-weight:600}
  .lv-pill{font-size:11.5px;font-weight:800;border-radius:99px;padding:3px 12px}
  .lv-pill.green{background:var(--green-bg);color:var(--green)}
  .lv-pill.amber{background:var(--amber-bg);color:var(--amber)}
  .lv-pill.red{background:var(--red-bg);color:var(--red)}
  ul.why{list-style:none}
  ul.why li{font-size:13.5px;line-height:1.65;color:var(--soft);padding:9px 0 9px 20px;border-top:1px solid var(--line);position:relative}
  ul.why li::before{content:'';position:absolute;left:2px;top:17px;width:7px;height:7px;border-radius:99px;background:var(--plum)}
  .back-quote{font-size:13px;color:var(--mut);margin-top:14px;line-height:1.7;font-weight:500}
  .back-btns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

  /* ---- shared cards ---- */
  .card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:20px;margin-bottom:14px;box-shadow:0 8px 26px rgba(84,74,110,.07)}
  h2.sec{font-size:11.5px;font-weight:800;letter-spacing:.22em;color:var(--mut);margin:2px 0 14px;text-transform:uppercase}
  .page-title{font-family:var(--serif);font-size:26px;font-weight:600;margin:12px 2px 18px;text-align:center}
  .cell .em{font-size:15px;line-height:1.15;margin-top:1px}
  .cell.fill .klabel{font-size:10.5px;font-weight:800;color:#fff;line-height:1.2}
  .p-total{font-size:14px;font-weight:700;color:#4E3D50;margin-top:8px}
  .p-total b{font-family:var(--serif);font-size:28px;font-weight:600;margin:0 2px}
  .p-hero{display:flex;align-items:baseline;gap:8px;margin-top:10px}
  .p-hero b{font-family:var(--serif);font-size:64px;font-weight:600;line-height:1;letter-spacing:-.01em;color:#2E4256}
  .p-hero span{font-size:17px;font-weight:700;color:#6E5F7B}
  .p-bar{height:9px;border-radius:99px;background:rgba(255,255,255,.6);margin-top:12px;overflow:hidden}
  .p-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#8E5274,#2E4256)}
  .hint{font-size:12px;color:var(--mut);margin-top:8px;font-weight:500;line-height:1.65}

  /* ---- check-in ---- */
  .q{margin-bottom:17px}
  .q label.t{display:block;font-size:12px;font-weight:700;color:var(--mut);letter-spacing:.08em;margin-bottom:9px}
  .opts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .opts.o3{grid-template-columns:repeat(3,1fr)}
  .opt{border:1.5px solid var(--pink);background:#fff;border-radius:99px;padding:10px 3px;text-align:center;font-size:13px;font-weight:700;color:var(--soft)}
  .opt.sel{border-color:var(--navy);background:var(--navy);color:#fff}
  .period-line{font-size:13.5px;color:var(--soft);margin-bottom:10px;font-weight:500}
  .period-line b{color:var(--rose)}
  .btnrow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .b-pri{background:var(--navy);color:#fff;border-radius:99px;padding:13px 20px;font-size:15px;flex:1;box-shadow:0 8px 20px rgba(46,66,86,.24)}
  .b-sec{background:var(--plum-bg);color:var(--plum);border-radius:99px;padding:12px 18px;font-size:14px}
  .b-ghost{background:#fff;color:var(--soft);border:1.5px solid var(--pink);border-radius:99px;padding:12px 18px;font-size:14px}

  /* ---- calendar ---- */
  .seg{display:flex;background:var(--pink-soft);border-radius:99px;padding:4px;gap:2px;width:max-content}
  .seg button{background:none;border-radius:99px;padding:8px 22px;font-size:13px;color:var(--soft)}
  .seg button.on{background:var(--navy);color:#fff}
  .cal-head{display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px}
  .cal-title{font-family:var(--serif);font-size:20px;font-weight:600}
  .cal-nav button{background:#fff;border:1px solid var(--line);border-radius:99px;width:34px;height:34px;font-size:15px;color:var(--soft);padding:0}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal .wdh{text-align:center;font-size:10.5px;font-weight:700;color:var(--mut);padding:4px 0;letter-spacing:.1em}
  .cell{min-height:56px;border-radius:14px;padding:5px 2px 4px;text-align:center;background:#fff;border:1.5px solid transparent}
  .cell.out{opacity:.28}
  .cell.today{border-color:var(--navy)}
  .cell .dn{font-size:11px;font-weight:700;color:var(--mut)}
  .cell .ind{font-size:12.5px;font-weight:800;margin-top:3px}
  .cell .sub{font-size:9px;font-weight:700;color:var(--mut);letter-spacing:.02em}
  .cell .mens{display:block;width:5px;height:5px;border-radius:99px;background:var(--rose);margin:3px auto 0}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11px;font-weight:700;color:var(--soft)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:99px;margin-right:5px;font-style:normal}
  .day-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--line);font-size:14px}
  .day-row:first-of-type{border-top:none}
  .day-row .dt{width:76px;color:var(--mut);flex-shrink:0;font-weight:600;font-size:13px}
  .day-row .nm{flex:1;font-weight:700}
  .day-row .nm small{display:block;font-weight:500;color:var(--mut);font-size:12px}
  .day-row .km{font-family:var(--serif);font-weight:600;font-size:16px}
  .day-row.is-today{background:var(--blue-bg);margin:0 -10px;padding:11px 10px;border-radius:14px;border-top:none}
  .day-row.dim{opacity:.45}
  .sel-detail{margin-top:12px;background:var(--pink-soft);border-radius:16px;padding:13px 16px;font-size:13px;color:var(--soft);line-height:1.65}
  .sel-detail b{color:var(--navy)}

  /* ---- history poster ---- */
  .poster{border-radius:28px;overflow:hidden;background:#fff;border:1px solid var(--line);box-shadow:0 18px 44px rgba(84,74,110,.14);margin-bottom:14px}
  .p-head{background:linear-gradient(115deg,#F2DCE9 0%,#E8E4F0 45%,#CFE6F4 100%);padding:26px 24px 22px;position:relative}
  .p-script{font-family:var(--script);font-size:24px;color:var(--plum);line-height:1.3}
  .p-month{font-family:var(--serif);font-size:44px;font-weight:600;line-height:1.1;margin-top:6px;letter-spacing:.01em}
  .p-sub{font-size:11px;font-weight:700;letter-spacing:.26em;color:var(--soft);margin-top:6px}
  .p-body{padding:18px 20px 20px}
  .p-body .cal{gap:3px}
  .p-body .cell{min-height:54px;border-radius:11px;padding-top:3px}
  .p-mark{width:26px;height:26px;border-radius:99px;display:grid;place-items:center;margin:2px auto 0;font-size:9.5px;font-weight:800;color:#fff}
  .p-mark.miss{background:none;border:1.5px dashed #D9D2DC;color:transparent}
  .p-mark.future{background:none;color:var(--mut);font-weight:700}
  .p-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;border-top:1px solid var(--line);padding-top:16px}
  .p-stat{text-align:center}
  .p-stat .v{font-family:var(--serif);font-size:24px;font-weight:600}
  .p-stat .k{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--mut);margin-top:2px}
  .p-foot{display:flex;justify-content:space-between;align-items:center;padding:0 20px 18px;font-size:10.5px;font-weight:700;letter-spacing:.2em;color:var(--mut)}
  .p-foot .wm{font-family:var(--serif);font-size:16px;letter-spacing:.02em;color:var(--navy)}

  /* ---- settings ---- */
  .frm label{display:block;font-size:12px;font-weight:700;color:var(--mut);margin:13px 0 6px;letter-spacing:.05em}
  .frm input{width:100%;font:inherit;font-weight:600;padding:11px 14px;border:1.5px solid var(--pink);border-radius:14px;background:#fff;color:var(--ink);text-align:left}
  .frm input[type=date]{-webkit-appearance:none;appearance:none}
  .frm input[type=date]::-webkit-date-and-time-value{text-align:left;margin:0}
  .frm input:focus-visible{outline:3px solid var(--blue-deep);outline-offset:1px;border-color:var(--blue-deep)}
  textarea#io{width:100%;height:90px;font:12px ui-monospace,monospace;border:1.5px solid var(--pink);border-radius:14px;padding:10px;margin-top:10px;background:#fff}
  .banner{background:var(--amber-bg);color:var(--amber);border-radius:16px;padding:12px 15px;font-size:13px;font-weight:700;margin-bottom:14px}

  /* ---- nav ---- */
  nav.tabs{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(12px + env(safe-area-inset-bottom));z-index:5;
    width:min(492px,calc(100% - 28px));
    background:rgba(255,255,255,.86);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.95);border-radius:99px;display:flex;gap:2px;
    padding:6px;box-shadow:0 14px 34px rgba(46,66,86,.18)}
  nav.tabs button{flex:1;background:none;color:var(--mut);font-size:13px;font-weight:700;padding:11px 0;border-radius:99px}
  nav.tabs button.on{color:#fff;background:var(--navy)}
</style>
</head>
<body>

<div class="scene" aria-hidden="true">
  <div class="hill h1"></div><div class="hill h2"></div><div class="hill h3"></div>
  <div class="arc"></div><div class="arc a2"></div>
</div>
<button class="gear" onclick="switchView('settings')" aria-label="设置">⚙︎</button>

<div id="app">
  <section class="view" id="view-today"></section>
  <section class="view" id="view-checkin"></section>
  <section class="view" id="view-plan"></section>
  <section class="view" id="view-history"></section>
  <section class="view" id="view-settings"></section>
</div>
<nav class="tabs" aria-label="主导航">
  <button data-v="today">今天</button>
  <button data-v="checkin">打卡</button>
  <button data-v="plan">课表</button>
  <button data-v="history">历程</button>
</nav>

<script>
'use strict';
const KEY='shangma.v1';
const DEFAULTS={
  raceHyrox:'2026-08-01', raceUtmb:'2026-11-29', raceMarathon:'2026-12-06',
  goal:'上马 5:00 完赛', weeklyKm:25, longestRun:12, cycleLen:28, lastPeriod:''
};
let state=load();
function load(){
  try{const s=JSON.parse(localStorage.getItem(KEY));
    if(s&&s.settings){s.settings={...DEFAULTS,...s.settings};return s;}
  }catch(e){}
  return {settings:{...DEFAULTS},planStart:null,checkins:{},cycleStarts:[],overdueChecks:[],overrides:{}};
}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}

/* ---------- dates ---------- */
function p(s){const[a,b,c]=s.split('-').map(Number);return new Date(a,b-1,c);}
function f(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addD(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function addM(d,n){return new Date(d.getFullYear(),d.getMonth()+n,1);}
function monday(d){const x=new Date(d);x.setDate(x.getDate()-((x.getDay()+6)%7));return x;}
function dayDiff(a,b){return Math.round((p(f(a))-p(f(b)))/864e5);}
function todayStr(){return f(new Date());}
const WD=['日','一','二','三','四','五','六'];
const MONTH_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];

if(!state.planStart){state.planStart=f(monday(new Date()));save();}
if(state.settings.lastPeriod&&!state.cycleStarts.length){state.cycleStarts=[state.settings.lastPeriod];save();}

/* ---- seed: Apple Watch history (May-Jul 2026, from user's Sessions screenshots) ---- */
const SEED_HIST=[
  ['2026-05-02','hike',3.9],['2026-05-03','long',19.9],['2026-05-09','easy',10],
  ['2026-05-20','stretch',0],['2026-05-21','easy',5],
  ['2026-05-22','cross',0],['2026-05-23','hike',8.5],['2026-05-25','cross',0],['2026-05-27','cross',0],

/* ---------- cycle phase ---------- */
function phaseFor(ds){
  const cs=[...state.cycleStarts].sort();
  if(!cs.length)return{name:'周期未设置',key:'unset',adj:0,day:null};
  const last=cs[cs.length-1];
  const day=dayDiff(p(ds),p(last))+1;
  if(day<1)return{name:'周期未设置',key:'unset',adj:0,day:null};
  const C=state.settings.cycleLen;
  let predicted=C;
  const od=state.overdueChecks.filter(x=>x>last).sort();
  if(od.length)predicted=Math.max(predicted,dayDiff(p(od[od.length-1]),p(last))+2);
  if(day>predicted)return{name:'经期推迟中（第'+day+'天）',key:'overdue',adj:-10,day};
  return phaseOfDay(day,predicted);
}
function phaseOfDay(day,predicted){
  if(day<=2)return{name:'经期第'+day+'天',key:'mens1',adj:-14,day};
  if(day<=5)return{name:'经期第'+day+'天',key:'mens2',adj:-6,day};
  if(day<=13)return{name:'卵泡期 · 第'+day+'天',key:'foll',adj:6,day};
  if(day<=16)return{name:'排卵期 · 第'+day+'天',key:'ovul',adj:0,day};
  if(day>predicted-4)return{name:'黄体期后段 · 第'+day+'天',key:'lute2',adj:-8,day};
  return{name:'黄体期 · 第'+day+'天',key:'lute',adj:0,day};
}
function recentStrain(){
  let s=0,n=0;
  for(let i=1;i<=3;i++){
    const k=f(addD(new Date(),-i)),ci=state.checkins[k];
    if(ci&&ci.sleep!=null){
      const ph=phaseFor(k);
      s+=55+SLEEP_ADJ[ci.sleep]+WORK_ADJ[ci.work]+ph.adj+FEEL_ADJ[ci.feel==null?1:ci.feel];n++;
    }
  }
  return n?s/n:null;
}
function phasePredict(ds){
  const cs=[...state.cycleStarts].sort();
  if(!cs.length)return{key:'unset',day:null};
  const C=state.settings.cycleLen;
  const diff=dayDiff(p(ds),p(cs[cs.length-1]));
  if(diff<0)return{key:'unset',day:null};
  const day=(diff%C)+1;
  return phaseOfDay(day,C);
}

/* ---------- plan engine (3-race periodization) ---------- */
function genPlan(){
  const s=state.settings;
  const start=monday(p(state.planStart));
  const hy=p(s.raceHyrox),ut=p(s.raceUtmb),ma=p(s.raceMarathon);
  const endMon=monday(ma);
  const hyMon=monday(hy);
  const nWeeks=Math.max(4,Math.round((endMon-start)/6048e5)+1);
  const map={},weeks=[];
  const set=(mon,i,w)=>{map[f(addD(mon,i))]=w;};
  const clampN=(v,a,b)=>Math.max(a,Math.min(b,Math.round(v)));
  const L0=Math.max(10,Math.min(16,s.longestRun));
  /* long-run ramp: linear from L0 (week 1) to 30 at the last build week (k=4) */
  let LB=1;
  for(let w=1;w<=nWeeks;w++){const mon=addD(start,(w-1)*7);if(Math.round((endMon-mon)/6048e5)===4)LB=w;}
  const ramp=w=>LB>1?Math.min(30,L0+(30-L0)*(w-1)/(LB-1)):30;
  const circ=w=>({t:'hyrox',min:50,note:(w%2?HYROX_A:HYROX_B)+'；'+TENDON_NOTE});
  for(let w=1;w<=nWeeks;w++){
    const mon=addD(start,(w-1)*7),sun=addD(mon,6);
    const mIdx=Math.round((mon-hyMon)/6048e5), k=Math.round((endMon-mon)/6048e5);
    let type,vol=0,long=0;
    const contains=d=>f(mon)<=f(d)&&f(d)<=f(sun);
    if(contains(hy)){
      type='hyroxrace';
      set(mon,1,{t:'easy',km:5});set(mon,2,{t:'hyrox',min:30,note:'赛前激活：轻量 2 轮循环就好，别练酸'});
      set(mon,3,{t:'easy',km:4});
      map[f(hy)]={t:'hyroxrace',km:0};
      set(mon,6,{t:'easy',km:6,note:'赛后放松跑，慢慢晃'});
      vol=15; long=6;
    }else if(contains(ma)){
      type='race';
      set(mon,1,{t:'easy',km:5});set(mon,3,{t:'strides',km:4});set(mon,5,{t:'shake',km:3});
      map[f(ma)]={t:'race',km:42.2};
      vol=54; long=42.2;
    }else if(contains(ut)){
      type='utmb';
      set(mon,1,{t:'easy',km:5});set(mon,3,{t:'strides',km:4});
      map[f(ut)]={t:'trail',km:20,note:'有爬升，全程按体感，心率别爆；下坡收着跑，护髌腱'};
      vol=29; long=20;
    }else if(k===2){
      type='pretaper'; long=22;
      set(mon,1,{t:'easy',km:6});set(mon,2,{t:'hyrox',min:35,note:'轻力量维持；'+TENDON_NOTE});
      set(mon,3,{t:'mp',km:7,note:'其中 3km 跑马拉松配速 7:05'});
      set(mon,5,{t:'easy',km:5});set(mon,6,{t:'long',km:22});
      vol=40;
    }else if(k===3){
      type='peak'; long=32;
      set(mon,1,{t:'easy',km:6});set(mon,2,circ(w));
      set(mon,3,{t:'mp',km:9,note:'其中 5km 跑马拉松配速 7:05'});
      set(mon,5,{t:'easy',km:6,note:'长距离前一天，轻松就好'});
      set(mon,6,{t:'long',km:32,note:'峰值长距离，练补给：每 40 分钟一次能量胶'});
      vol=53;
    }else{
      /* progression weeks: pre-Hyrox 也照常堆量（Hyrox 只求完赛） */
      const rec=(mIdx===1);
      let L=ramp(w);
      const cut=(w%4===0)&&(w<LB-1)&&!rec;
      if(cut)L*=0.75;
      if(rec)L*=0.85;
      long=Math.round(L);
      type=rec?'recover':(cut?'cutback':'build');
      const e1=clampN(long*0.28,5,8);
      const sat=clampN(long*0.32,5,10);
      let thu;
      if(mIdx<0)thu={t:'easy',km:clampN(long*0.32,5,9)};
      else if(rec)thu={t:'easy',km:clampN(long*0.3,4,7),note:'Hyrox 后恢复周，全部轻松'};
      else{
        const q=clampN(long*0.35,6,10);
        const r=mIdx%3;
        if(mIdx>=3&&r===1)thu={t:'hill',km:q,note:'上坡跑 6-8 组 × 90 秒，下坡走下来（护髌腱），或楼梯只上不下'};
        else if(mIdx>=3&&r===2)thu={t:'interval',km:Math.min(q,8),note:'6-8 组 × 400m @ 5:50-6:05，组间慢跑 400m；平路进行护髌腱。这是给最大摄氧量的课'};
        else if(mIdx>=3)thu={t:'mp',km:q,note:'其中 '+Math.min(6,3+Math.floor(mIdx/4))+'km 跑马拉松配速 7:05'};
        else thu={t:'easy',km:q};
      }
      set(mon,1,{t:'easy',km:e1});
      set(mon,2,rec?{t:'hyrox',min:35,note:'轻循环；'+TENDON_NOTE}:circ(w));
      set(mon,3,thu);
      set(mon,5,{t:'easy',km:sat,note:long>=24?'长距离前一天，轻松就好':''});
      set(mon,6,{t:'long',km:long});
      vol=e1+thu.km+sat+long;
    }
    weeks.push({w,type,vol:Math.round(vol),long:Math.round(long)});
  }
  /* menstrual overlay */
  const keys=Object.keys(map).sort();
  keys.forEach(ds=>{
    const w=map[ds];
    if(['race','hyroxrace','trail'].includes(w.t))return;
    const ph=phasePredict(ds);
    if(ph.key!=='mens1')return;
    if(w.t==='long'||w.t==='hill'||w.t==='mp'){
      const d=p(ds);
      const alt=[f(addD(d,-1)),f(addD(d,-2)),f(addD(d,1)),f(addD(d,2))].find(kk=>{
        const q=phasePredict(kk);
        return q.key!=='mens1'&&(!map[kk]||map[kk].t==='easy');
      });
      if(alt)map[alt]={...w,note:((w.note?w.note+'；':'')+'避开经期第1-2天，从'+ds.slice(5).replace('-','/')+'挪来')};
    }
    map[ds]={t:'rest',km:0,note:'经期第 1-2 天 · 休息（预测）'};
  });
  /* carry-forward */
  const tds=todayStr();
  for(let i=2;i>=1;i--){
    const k=f(addD(p(tds),-i));
    const w=map[k];
    if(!w||w.t!=='long'||state.overrides[k])continue;
    if(k<state.planStart)continue;
    const ci=state.checkins[k];
    if(ci&&ci.done)continue;
    let clash=false;
    for(let j=0;j<3;j++){const c=map[f(addD(p(tds),j))];if(c&&['long','race','trail','hyroxrace'].includes(c.t))clash=true;}
    if(clash)break;
    let target=null;
    for(let j=0;j<3;j++){
      const cand=f(addD(p(tds),j));
      if(phasePredict(cand).key==='mens1')continue;
      if(state.overrides[cand])continue;
      const cw=map[cand];
      if(cw&&cw.t!=='easy'&&cw.t!=='rest')continue;
      target=cand;break;
    }
    if(target){
      map[target]={t:'long',km:Math.max(8,Math.round(w.km*0.85)),note:'自动补 '+k.slice(5).replace('-','/')+' 未完成的长距离，减量 15%'};
      map[k]={t:'rest',km:0,note:'未完成，已自动顺延'};
    }
    break;
  }
  /* fatigue guard */
  const strain=recentStrain();
  if(strain!=null&&strain<45){
    const nxt=Object.keys(map).sort().find(d=>d>=tds&&map[d].t==='long');
    if(nxt)map[nxt]={...map[nxt],km:Math.max(8,Math.round(map[nxt].km*0.85)),
      note:(map[nxt].note?map[nxt].note+'；':'')+'近几天状态偏低，自动减量 15%'};
  }
  return{map,weeks,nWeeks};
}
function plannedFor(ds,map){return state.overrides[ds]||map[ds]||{t:'rest',km:0};}

/* ---------- readiness + adjustment ---------- */
const SLEEP_ADJ=[-18,-6,6,12], WORK_ADJ=[8,0,-8,-16], TIME_MIN=[35,60,90,150], FEEL_ADJ=[6,0,-12,0];
const SLEEP_TXT=['很差','一般','不错','很好'],WORK_TXT=['轻松','正常','较忙','爆表'],
      TIME_TXT=['<40分','约1小时','约1.5时','2小时+'],FEEL_TXT=['满血','正常','酸痛乏力','痛经/难受'],
      WEA_TXT=['舒适','炎热 33°+','雨/恶劣'];
function advice(ds){
  const {map}=genPlan();
  const planned=plannedFor(ds,map);
  const ph=phaseFor(ds);
  const ci=state.checkins[ds];
  if(!ci||ci.sleep==null)return{planned,w:planned,ph,score:null,level:'none',notes:[]};
  const feel=ci.feel==null?1:ci.feel, wea=ci.weather==null?0:ci.weather;
  const isRaceDay=['race','hyroxrace','trail','event'].includes(planned.t);
  const notes=[];
  if(!isRaceDay&&ph.key==='mens1'){
    notes.push('经期第 1-2 天：不训练。这两天的休息本来就写在课表里，不算欠账');
    if(feel===3)notes.push('痛经的话热敷、早点睡；第 3 天起看体感再恢复轻松跑');
    return{planned,w:{t:'rest',km:0},ph,score:10,level:'red',notes};
  }
  if(!isRaceDay&&feel===3){
    notes.push('身体明确在抗议（痛经/很难受）：今天休息，不看其他指标');
    return{planned,w:{t:'rest',km:0},ph,score:15,level:'red',notes};
  }
  let score=Math.max(0,Math.min(100,55+SLEEP_ADJ[ci.sleep]+WORK_ADJ[ci.work]+ph.adj+FEEL_ADJ[feel]));
  const level=score>=65?'green':score>=40?'amber':'red';
  let w={...planned};
  if(ph.key==='mens2')notes.push('经期第 '+ph.day+' 天：可以恢复轻松强度，按体感来');
  if(ph.key==='overdue')notes.push('经期推迟中，身体处于高负荷相位，先避开高强度');
  if(ph.key==='lute2')notes.push('黄体期后段，体感偏沉是正常的，配速允许放宽');
  if(ph.key==='foll'&&(w.t==='mp'||w.t==='hill'||w.t==='long'))notes.push('卵泡期是上强度的黄金窗口，今天的课值得认真跑');
  if(feel===2)notes.push('酸痛乏力：若是昨天练的延迟酸痛，轻松动一动反而恢复快；若是累，减量执行');
  if(isRaceDay){
    notes.push(planned.t==='event'?'活动日：按现场强度来，安全第一，累了就果断降档':'比赛日：前面所有调整都失效，按赛前计划执行，享受它');
    return{planned,w,ph,score,level:'green',notes};
  }
  if(level==='amber'){
    if(w.t==='long'){const nk=Math.max(8,Math.round(w.km*0.75));notes.push('状态一般：长距离 '+w.km+'km 调整为 '+nk+'km，配速再放慢 20-30 秒');w.km=nk;}
    else if(w.t==='mp'||w.t==='hill'||w.t==='interval'){w={t:'easy',km:Math.max(4,Math.round((w.km||6)*0.8))};notes.push('状态一般：取消强度段，改为纯轻松跑 '+w.km+'km');}
    else if(w.t==='hyrox'){w={...w,min:35};notes.push('状态一般：循环减到 3 轮、35 分钟收工');}
    else if(w.t==='easy'||w.t==='strides'){const nk=Math.max(4,Math.round(w.km*0.7));if(nk<w.km)notes.push('状态一般：'+w.km+'km 调整为 '+nk+'km');else notes.push('状态一般：保持短距离轻松跑，别加量');w={t:'easy',km:nk};}
  }else if(level==='red'){
    if(w.t==='long'){w={t:'rest',km:0};notes.push('状态欠佳：今天不跑。长距离是本周关键课，改天状态好时优先补（可一键顺延）');}
    else if(w.t!=='rest'){w={t:'rest',km:0};notes.push('状态欠佳：今天休息。休息也是训练的一部分，比硬撑一次更值');}
  }
  if(w.km>0){
    const tmin=TIME_MIN[ci.time],need=w.km*7.6+8;
    if(need>tmin){
      const fit=Math.max(0,Math.floor((tmin-8)/7.6));
      if(fit<4){w={t:'rest',km:0};notes.push('今天时间不足 40 分钟，与其挤一个碎片跑不如彻底休息');}
      else{
        if(planned.t==='long'&&fit<planned.km*0.7)notes.push('今天时间只够 '+fit+'km，长距离建议顺延（可一键顺延）');
        notes.push('时间有限：调整为 '+fit+'km');w.km=fit;
      }
    }
  }
  if(w.km>0||w.t==='hyrox'){
    if(wea===1&&w.t!=='hyrox')notes.push('🌡 高温：改清晨 6-7 点或日落后跑；或直接进健身房跑步机同量完成，多带水和电解质');
    if(wea===2){
      if(w.t==='long'){const nk=Math.round(w.km*0.85);notes.push('🌧 天气恶劣：转室内跑步机，'+w.km+'km 减到 '+nk+'km，坡度调 1% 补偿');w.km=nk;w.note=(w.note?w.note+'；':'')+'室内跑步机';}
      else if(w.t!=='hyrox')notes.push('🌧 天气恶劣：转室内。跑步机同量，或换一节 45 分钟 Hyrox 循环（下雨天正好练力量）');
    }
  }
  return{planned,w,ph,score,level,notes};
}

function celebrate(){
  try{if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;}catch(e){}
  let cv=document.getElementById('confetti');
  if(!cv){cv=document.createElement('canvas');cv.id='confetti';cv.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:99';document.body.appendChild(cv);}
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const cols=['#8E5274','#C7E2F2','#F0DCE7','#2E4256','#E8A0BF','#FFFFFF'];
  const ps=Array.from({length:100},()=>({x:cv.width/2,y:cv.height*0.42,vx:(Math.random()-0.5)*12,vy:-(Math.random()*10+4),r:Math.random()*5+3,c:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*6}));
  let t0=null;
  function step(ts){
    if(!t0)t0=ts;const el=ts-t0;
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.globalAlpha=Math.max(0,1-el/1500);
    ps.forEach(q=>{q.x+=q.vx;q.y+=q.vy;q.vy+=0.26;q.rot+=0.1;
      ctx.save();ctx.translate(q.x,q.y);ctx.rotate(q.rot);ctx.fillStyle=q.c;ctx.fillRect(-q.r,-q.r/2,q.r*2,q.r);ctx.restore();});
    ctx.globalAlpha=1;
    if(el<1600)requestAnimationFrame(step);else ctx.clearRect(0,0,cv.width,cv.height);
  }
  requestAnimationFrame(step);
}
function streak(){
  let n=0,d=p(todayStr());
  const t=state.checkins[todayStr()];
  if(!(t&&t.done))d=addD(d,-1);
  while(true){const c=state.checkins[f(d)];if(c&&c.done){n++;d=addD(d,-1);}else break;}
  return n;
}

/* ---------- calendar helpers ---------- */
function calGrid(cur,cellFn){
  const y=cur.getFullYear(),m=cur.getMonth();
  const first=new Date(y,m,1);
  const startIdx=(first.getDay()+6)%7;
  const days=new Date(y,m+1,0).getDate();
  let h='<div class="cal">';
  ['一','二','三','四','五','六','日'].forEach(w=>h+='<div class="wdh">'+w+'</div>');
  for(let i=0;i<startIdx;i++)h+='<div></div>';
  for(let dd=1;dd<=days;dd++)h+=cellFn(f(new Date(y,m,dd)),dd);
  h+='</div>';
  return h;
}

      if(ci&&ci.done){
        const bg=TYPE_INK[ci.doneType]||'#5E82A6';
        let c='<div class="cell fill'+(k===todayStr()?' today':'')+'" style="background:'+bg+'" onclick="selCal(\''+k+'\')">';
        c+='<div class="dn num">'+dd+'</div>';
        c+='<div class="em">'+(TYPE_EMOJI[ci.doneType]||'✓')+'</div>';
        c+='<div class="klabel num">'+(ci.doneKm>0?(ci.doneKm%1?ci.doneKm.toFixed(1):ci.doneKm)+'k':'✓')+'</div>';
        if(ci.extras&&ci.extras.length)c+='<div class="plus">+'+ci.extras.length+'</div>';
        c+='</div>';
        return c;
      }
      const ink=TYPE_INK[w.t]||'#C9CDD6';
      let c='<div class="cell'+(k===todayStr()?' today':'')+'" onclick="selCal(\''+k+'\')">';
      c+='<div class="dn num">'+dd+'</div>';
      if(isRace)c+='<div class="ind" style="color:'+ink+'">★</div>';
      else if(w.km>0)c+='<div class="ind num" style="color:'+ink+'">'+w.km+'</div>';
      else if(w.min)c+='<div class="ind" style="color:'+ink+'">H</div>';
      else c+='<div class="ind" style="color:#D9D2DC">·</div>';
      if(mens)c+='<span class="mens"></span>';
      c+='</div>';
      return c;
    });
    h+='<div class="legend"><span><i style="background:#8E5274"></i>长距离/强度</span><span><i style="background:#5E82A6"></i>轻松跑</span><span><i style="background:#2E4256"></i>Hyrox</span><span><i style="background:#C95C7E"></i>预测经期</span><span>★ 比赛</span></div>';
    if(selDay){
      const w=plannedFor(selDay,map);
      const t=TYPES[w.t]||TYPES.rest;
      h+='<div class="sel-detail"><b>'+selDay.slice(5).replace('-','/')+' 周'+WD[p(selDay).getDay()]+' · '+esc(t.label)+(w.km>0?' '+w.km+'km':'')+'</b>'+(w.note?'<br>'+esc(w.note):'')+(t.pace?'<br>'+esc(t.pace):'')+'</div>';
    }
  }
  h+='<p class="hint"><b>配速表</b>：轻松跑 7:20-7:55（心率 ~135-150，能聊天）· 长距离 7:30-8:00 · 马配 7:05-7:10 · 间歇快段 5:50-6:05。<br>打卡影响课表的四条通道：① 当天课立即调整；② 「今天来了」重排整个周期；③ 错过的长距离自动在近 3 天补上；④ 近 3 天状态持续偏低，下一个长距离自动减量。手动改过的天标 ✎。</p>';
  h+='</div>';
  $('#view-plan').innerHTML=h;
}
window.setCalMode=function(m){calMode=m;selDay=null;selPlan=null;renderPlan(todayStr());};
window.calNav=function(n){calCur=addM(calCur,n);selDay=null;renderPlan(todayStr());};
window.selCal=function(k){selDay=k;renderPlan(todayStr());};
window.editDay=function(k){selPlan=(selPlan===k?null:k);planDraft=null;renderPlan(todayStr());};
window.pdType=function(t){
  planDraft.km=$('#pd-km')?$('#pd-km').value:planDraft.km;
  planDraft.note=$('#pd-note')?$('#pd-note').value:planDraft.note;
  planDraft.t=t;renderPlan(todayStr());
};
window.savePlanEdit=function(){
  if(!selPlan)return;
  const km=Number($('#pd-km').value)||0;
  const note=$('#pd-note').value||'';
  state.overrides[selPlan]={t:planDraft.t,km:planDraft.t==='rest'?0:km,note,manual:true};
  selPlan=null;planDraft=null;render();
};
window.clearPlanEdit=function(){if(selPlan)delete state.overrides[selPlan];selPlan=null;planDraft=null;render();};
window.cancelPlanEdit=function(){selPlan=null;planDraft=null;renderPlan(todayStr());};

/* ---------- history ---------- */
function renderHistory(ds){
  const {map}=genPlan();
  if(!histCur)histCur=new Date(p(ds).getFullYear(),p(ds).getMonth(),1);
  const y=histCur.getFullYear(),m=histCur.getMonth();
  let km=0,doneN=0,plannedN=0,longest=0,strengthN=0;
  const daysIn=new Date(y,m+1,0).getDate();
  for(let dd=1;dd<=daysIn;dd++){
    const k=f(new Date(y,m,dd));
    if(k>ds)continue;
    const w=plannedFor(k,map);
    const ci=state.checkins[k];
    const isSession=(w.km>0||w.min);
    if(isSession)plannedN++;
    if(ci&&ci.done){
      doneN++;
      const dk=ci.doneKm!=null?ci.doneKm:(w.km||0);
      const dt=ci.doneType||w.t;
      if(RUN_TYPES.includes(dt)){km+=dk;longest=Math.max(longest,dk);}
      if(dt==='hyrox'||dt==='cross')strengthN++;
      (ci.extras||[]).forEach(e=>{if(e.t==='hyrox'||e.t==='cross')strengthN++;});
    }
  }
  const rate=plannedN?Math.min(100,Math.round(doneN/plannedN*100)):(doneN?100:0);
  /* monthly run-km target = planned run km across the whole month */
  let targetKm=0;
  for(let dd=1;dd<=daysIn;dd++){
    const k=f(new Date(y,m,dd));
    const w=plannedFor(k,map);
    if(RUN_TYPES.includes(w.t)&&w.km>0)targetKm+=w.km;
  }
  targetKm=Math.round(Math.max(targetKm,km));
  const pct=targetKm?Math.min(100,Math.round(km/targetKm*100)):0;
  const next=races().find(r=>r.date>=ds);
  let h='<p class="page-title">历程</p>';
  h+='<div class="poster">';
  h+='<div class="p-head"><div class="p-script">'+esc(dailySlogan('green'))+'</div>';
  h+='<div class="p-month">'+MONTH_EN[m]+'</div>';
  h+='<div class="p-hero num"><b>'+Math.round(km)+'</b><span>/ '+targetKm+' km</span></div>';
  h+='<div class="p-bar"><i style="width:'+pct+'%"></i></div>';
  h+='<div class="p-total">本月跑量目标完成 <b class="num" style="font-size:20px">'+pct+'%</b> · 动了 <b class="num" style="font-size:20px">'+doneN+'</b> 天</div>';
  h+='<div class="p-sub num">'+y+' · VELA · RUN + RECOVER</div></div>';
  h+='<div class="p-body">';
  h+=calGrid(histCur,(k,dd)=>{
    const w=plannedFor(k,map);
    const ci=state.checkins[k];
    const done=ci&&ci.done;
    const isSession=(w.km>0||w.min);
    const isRace=['race','hyroxrace','trail','event'].includes(w.t);
    if(done){
      const dk=ci.doneKm!=null?ci.doneKm:(w.km||0);
      const dt=ci.doneType||w.t;
      const bg=TYPE_INK[dt]||'#5E82A6';
      let c='<div class="cell fill'+(k===selHist?' today':'')+'" style="background:'+bg+'" onclick="histSel(\''+k+'\')">';
      c+='<div class="dn num">'+dd+'</div>';
      c+='<div class="em">'+(TYPE_EMOJI[dt]||'✓')+'</div>';
      c+='<div class="klabel num">'+(dk>0?(dk%1?dk.toFixed(1):dk)+'k':'✓')+'</div>';
      if(ci.extras&&ci.extras.length)c+='<div class="plus">+'+ci.extras.length+'</div>';
      c+='</div>';
      return c;
    }
    let c='<div class="cell'+(k===ds?' today':'')+(k===selHist?' today':'')+'"'+(k<=ds?' onclick="histSel(\''+k+'\')"':'')+'><div class="dn num">'+dd+'</div>';
    if(k<ds&&isSession)c+='<div class="p-mark miss">·</div>';
    else if(k>=ds&&isRace)c+='<div class="p-mark future" style="color:#8E5274">★</div>';
    else if(k>=ds&&isSession)c+='<div class="p-mark future">'+(w.km||'·')+'</div>';
    c+='</div>';
    return c;
  });
  h+='<div class="p-stats">';
  h+='<div class="p-stat"><div class="v num">'+Math.round(longest)+'</div><div class="k">最长一次 KM</div></div>';
  h+='<div class="p-stat"><div class="v num">'+rate+'%</div><div class="k">完成率</div></div>';
  h+='<div class="p-stat"><div class="v num">'+strengthN+'</div><div class="k">力量 / 交叉</div></div>';
  h+='<div class="p-stat"><div class="v num">'+streak()+'</div><div class="k">🔥 连续天数</div></div>';
  h+='</div></div>';
  h+='<div class="p-foot"><span class="wm">Vela</span><span>'+(next?esc(next.name).toUpperCase()+' T−'+dayDiff(p(next.date),new Date()):'')+'</span></div>';
  h+='</div>';
  h+='<div class="btnrow" style="justify-content:space-between"><button class="b-ghost" onclick="histNav(-1)">‹ 上个月</button><button class="b-ghost" onclick="histNav(1)">下个月 ›</button></div>';
  if(selHist){
    const ci=state.checkins[selHist];
    h+='<div class="card"><h2 class="sec">补记 '+selHist.slice(5).replace('-','/')+' 周'+WD[p(selHist).getDay()]+'</h2>';
    if(ci&&ci.done)h+='<p class="hint" style="margin-top:0;font-size:14px;color:var(--ink)"><b>那天：'+(TYPE_EMOJI[ci.doneType]||'✓')+' '+esc((TYPES[ci.doneType]||TYPES.easy).label)+(ci.doneKm?' '+ci.doneKm+' km':'')+'</b>'+(ci.extras&&ci.extras.length?'，另加 '+ci.extras.map(e=>esc((TYPES[e.t]||TYPES.cross).label)).join('、'):'')+'</p>';
    else h+='<p class="hint" style="margin-top:0">那天没有记录。'+(plannedFor(selHist,map).km>0?'原计划：'+esc((TYPES[plannedFor(selHist,map).t]||TYPES.rest).label)+' '+plannedFor(selHist,map).km+'km。':'')+'可以在下面补记。</p>';
    h+='<div class="btnrow" style="margin-top:8px;align-items:center">';
    h+='<input id="bf-km" type="number" inputmode="decimal" placeholder="km" style="width:90px;font:inherit;font-weight:600;padding:10px 12px;border:1.5px solid var(--pink);border-radius:12px">';
    h+='<button class="b-pri" style="flex:0 1 auto" onclick="bfRun()">记跑步</button>';
    h+='<button class="b-sec" onclick="bfStrength()">记力量</button>';
    h+='<button class="b-ghost" onclick="bfClear()">清除</button></div>';
    h+='<p class="hint">补记会计入月度统计，也让引擎知道那天已经练过（不会再自动补课）。</p></div>';
  }
  h+='<p class="hint" style="text-align:center">🏃‍♀️ 跑步 · ⛰️ 越野跑（都计入跑量，数字 = 公里）· 💪 力量/交叉 · 🧘‍♀️ 拉伸 · 😴 休息好 · 🏁 比赛 · +n = 当天加练<br>虚线圈 = 错过 · 浅字 = 计划中 · <b>点任意过去的日期可补记</b> · 截图即可分享 ✨</p>';
  $('#view-history').innerHTML=h;
}
window.histNav=function(n){histCur=addM(histCur,n);selHist=null;renderHistory(todayStr());};
window.histSel=function(k){selHist=(selHist===k?null:k);renderHistory(todayStr());};
function bfSet(ds,d){
  const prev=state.checkins[ds]||{sleep:1,work:1,time:1,feel:1,weather:0};
  state.checkins[ds]={...prev,done:true,backfill:true,...d};
  selHist=null;render();
}
window.bfRun=function(){
  if(!selHist)return;
  const km=Number($('#bf-km').value)||0;
  if(km<=0){alert('先填公里数');return;}
  bfSet(selHist,{doneKm:km,doneType:km>=10?'long':'easy'});
};
window.bfStrength=function(){if(selHist)bfSet(selHist,{doneKm:0,doneType:'hyrox'});};
window.bfClear=function(){if(!selHist)return;delete state.checkins[selHist];selHist=null;render();};

/* ---------- settings ---------- */
function renderSettings(){
  const s=state.settings;
  let h='<p class="page-title">设置</p><div class="card frm"><h2 class="sec">赛程</h2>';
  h+='<label for="in-hy">🏋️ 成都 Hyrox（混合接力）</label><input id="in-hy" type="date" value="'+s.raceHyrox+'">';
  h+='<label for="in-ut">⛰ 清迈 UTMB 20K</label><input id="in-ut" type="date" value="'+s.raceUtmb+'">';
  h+='<label for="in-ma">🏁 上海马拉松（主目标）</label><input id="in-ma" type="date" value="'+s.raceMarathon+'">';
  h+='<label for="in-goal">目标</label><input id="in-goal" type="text" value="'+esc(s.goal)+'">';
  h+='<h2 class="sec" style="margin-top:20px">训练基线</h2>';
  h+='<label for="in-vol">当前周跑量（km）</label><input id="in-vol" type="number" inputmode="numeric" value="'+s.weeklyKm+'">';
  h+='<label for="in-long">最近最长一次跑了（km）</label><input id="in-long" type="number" inputmode="numeric" value="'+s.longestRun+'">';
  h+='<p class="hint">课表默认工作日短课（周二/周四晚）、周末长课（周日），不锁死每周次数：训练密度跟着周期相位和你的每日状态走。</p>';
  h+='<h2 class="sec" style="margin-top:20px">生理周期</h2>';
  h+='<label for="in-cyc">平均周期（天）</label><input id="in-cyc" type="number" inputmode="numeric" value="'+s.cycleLen+'">';
  h+='<label for="in-lp">上次月经第一天</label><input id="in-lp" type="date" value="'+(s.lastPeriod||'')+'">';
  h+='<p class="hint">之后不用改这里：每天打卡里点「今天来了」即可自动更新。</p>';
  h+='<div class="btnrow"><button class="b-pri" onclick="saveSettings()">保存设置</button></div></div>';
  h+='<div class="card"><h2 class="sec">数据</h2>';
  h+='<div class="btnrow" style="margin-top:0"><button class="b-sec" onclick="exportData()">导出</button><button class="b-ghost" onclick="importData()">导入</button></div>';
  h+='<textarea id="io" placeholder="导出后复制保存；导入时把 JSON 粘到这里再点导入"></textarea>';
  h+='<p class="hint">数据只存在本机浏览器里。换手机或清缓存前先导出。</p></div>';
  $('#view-settings').innerHTML=h;
}
window.saveSettings=function(){
  const s=state.settings;
  s.raceHyrox=$('#in-hy').value||s.raceHyrox;
  s.raceUtmb=$('#in-ut').value||s.raceUtmb;
  s.raceMarathon=$('#in-ma').value||s.raceMarathon;
  s.goal=$('#in-goal').value;
  s.weeklyKm=Math.max(10,Number($('#in-vol').value)||s.weeklyKm);
  s.longestRun=Math.max(5,Number($('#in-long').value)||s.longestRun);
  s.cycleLen=Math.min(45,Math.max(20,Number($('#in-cyc').value)||s.cycleLen));
  const lp=$('#in-lp').value;
  if(lp&&lp!==s.lastPeriod){s.lastPeriod=lp;state.cycleStarts=[lp];state.overdueChecks=[];}
  render();switchView('today');
};
window.exportData=function(){$('#io').value=JSON.stringify(state);$('#io').select();try{document.execCommand('copy');}catch(e){}};
window.importData=function(){
  try{const s=JSON.parse($('#io').value);
    if(s&&s.settings){state=s;state.settings={...DEFAULTS,...s.settings};save();render();switchView('today');}
  }catch(e){alert('JSON 格式不对，检查一下粘贴内容');}
};

render();
switchView('today');
</script>
